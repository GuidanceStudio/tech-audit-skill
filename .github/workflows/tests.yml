name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint scripts
        run: |
          pip install ruff pytest
          ruff check claude/*/scripts/ tests/
      - name: Run test suite
        run: python -m pytest tests/ -q
